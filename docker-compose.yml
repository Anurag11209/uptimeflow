# Backend Uptime — local development & self-host stack.
#
#   docker compose up -d postgres redis mailpit   # infra only (recommended for dev)
#   pnpm db:migrate && pnpm db:seed                # apply schema + demo org
#   pnpm dev                                       # run apps with hot reload
#
# To run the full containerized stack (api + worker + web), use:
#   docker compose up --build
#
# Observability (Prometheus + Grafana) is behind a profile:
#   docker compose --profile observability up -d

name: backend-uptime

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uptime
      POSTGRES_PASSWORD: uptime
      POSTGRES_DB: backend_uptime
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptime -d backend_uptime"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local SMTP sink — catches every outbound email. UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: "500"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://uptime:uptime@postgres:5432/backend_uptime
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me-in-production-0001}
      BETTER_AUTH_URL: http://localhost:4000
      WEB_URL: http://localhost:3000
      API_PORT: "4000"
      CORS_ORIGINS: http://localhost:3000
      EMAIL_PROVIDER: smtp
      EMAIL_FROM: "Backend Uptime <alerts@localhost>"
      SMTP_URL: smtp://mailpit:1025
      METRICS_TOKEN: ${METRICS_TOKEN:-dev-metrics-token}
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      EMAIL_PROVIDER: smtp
      EMAIL_FROM: "Backend Uptime <alerts@localhost>"
      SMTP_URL: smtp://mailpit:1025
      WORKER_CONCURRENCY: "10"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"

volumes:
  postgres-data:
  redis-data:
  grafana-data:
