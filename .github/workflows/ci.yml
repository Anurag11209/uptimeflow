name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"

# ── Deployment configuration (set these in the repo's Settings) ────────
# Secrets:
#   AWS_DEPLOY_ROLE_ARN  → terraform output github_actions_deploy_role_arn
# Variables:
#   DEPLOY_ENABLED       = "true"  (turns on build→ECR→ECS; off until infra exists)
#   AWS_REGION           = us-east-1
#   ECS_CLUSTER          = uptimeflow-production            (= terraform name_prefix)
#   ECS_SUBNETS          = subnet-aaa subnet-bbb            (private subnets, space-separated)
#   ECS_SECURITY_GROUP   = sg-xxxx                          (worker SG; reaches RDS for migrate)
#   NEXT_PUBLIC_API_URL  = https://api.uptimeflow.in        (baked into the web image)
# ECR repos and service/task families follow "${ECS_CLUSTER}-<app>".

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate -no-color

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    permissions:
      contents: read
      id-token: write # OIDC federation into AWS, no static keys
    strategy:
      matrix:
        app: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image (${{ matrix.app }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ vars.ECS_CLUSTER }}-${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  deploy:
    name: Migrate & deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      CLUSTER: ${{ vars.ECS_CLUSTER }}
      TAG: ${{ github.sha }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Registers a new task-definition revision for <family> using <image-app>'s
      # image at the current SHA, preserving roles/network/sizing from the live
      # revision. Echoes the new task-def ARN.
      - name: Run DB migrations (one-off task)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          SUBNETS: ${{ vars.ECS_SUBNETS }}
          SECURITY_GROUP: ${{ vars.ECS_SECURITY_GROUP }}
        run: |
          set -euo pipefail
          subnets_json=$(printf '"%s",' $SUBNETS | sed 's/,$//')
          image="${REGISTRY}/${CLUSTER}-api:${TAG}"
          td=$(aws ecs describe-task-definition --task-definition "${CLUSTER}-migrate" --query 'taskDefinition')
          new=$(echo "$td" | jq --arg IMG "$image" '
            .containerDefinitions[0].image=$IMG
            | {family,taskRoleArn,executionRoleArn,networkMode,containerDefinitions,requiresCompatibilities,cpu,memory,runtimePlatform}')
          arn=$(aws ecs register-task-definition --cli-input-json "$new" --query 'taskDefinition.taskDefinitionArn' --output text)
          task=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$arn" --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$subnets_json],securityGroups=[$SECURITY_GROUP],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $task"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$task"
          code=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$task" --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Migration exit code: $code"
          [ "$code" = "0" ]

      - name: Deploy services (rolling, zero-downtime)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          register() {
            local app="$1"
            local image="${REGISTRY}/${CLUSTER}-${app}:${TAG}"
            local td new
            td=$(aws ecs describe-task-definition --task-definition "${CLUSTER}-${app}" --query 'taskDefinition')
            new=$(echo "$td" | jq --arg IMG "$image" '
              .containerDefinitions[0].image=$IMG
              | {family,taskRoleArn,executionRoleArn,networkMode,containerDefinitions,requiresCompatibilities,cpu,memory,runtimePlatform}')
            aws ecs register-task-definition --cli-input-json "$new" --query 'taskDefinition.taskDefinitionArn' --output text
          }
          for app in api web worker; do
            arn=$(register "$app")
            echo "Updating ${CLUSTER}-${app} → ${arn}"
            aws ecs update-service --cluster "$CLUSTER" --service "${CLUSTER}-${app}" \
              --task-definition "$arn" >/dev/null
          done
          echo "Waiting for services to stabilize…"
          aws ecs wait services-stable --cluster "$CLUSTER" \
            --services "${CLUSTER}-api" "${CLUSTER}-web" "${CLUSTER}-worker"
          echo "Deploy complete."
